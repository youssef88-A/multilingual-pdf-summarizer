version: '3.8'

services:
  api:
    image: ${DOCKER_USERNAME}/multilingual-summarizer:latest
    container_name: multilingual-summarizer-prod
    ports:
      - "8000:8000"
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - LOG_LEVEL=INFO
      - CONFIG_PATH=/app/config.yaml
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./temp:/tmp/pdf_summarizer
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - summarizer-network

  nginx:
    image: nginx:alpine
    container_name: summarizer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - summarizer-network
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: summarizer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - summarizer-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: summarizer-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - summarizer-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: summarizer-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - summarizer-network
    restart: unless-stopped

networks:
  summarizer-network:
    driver: bridge

volumes:
  redis-data:
  prometheus-data:
  grafana-data: